name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22.x"
  API_PROJECT: "src/AulaIA.Api/AulaIA.Api.csproj"
  WEB_DIR: "src/aulaia-web"
  PUBLISH_DIR: "publish"
  AZURE_WEBAPP_NAME: "app-demo-api"
  AZURE_RESOURCE_GROUP: "rg-ezequiel"
  CONTAINER_APP_NAME: "ca-aulaia-api"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js + Next.js build ────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WEB_DIR }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Build Next.js (static export)
        working-directory: ${{ env.WEB_DIR }}
        run: npm run build

      # ── .NET build + publish ───────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET dependencies
        run: dotnet restore ${{ env.API_PROJECT }}

      - name: Build .NET
        run: dotnet build ${{ env.API_PROJECT }} --no-restore --configuration Release

      - name: Publish .NET
        run: dotnet publish ${{ env.API_PROJECT }} --no-build --configuration Release --output ${{ env.PUBLISH_DIR }}

      # ── Copiar frontend → wwwroot del artefacto .NET ──────────
      - name: Copy Next.js output to wwwroot
        run: cp -r ${{ env.WEB_DIR }}/out ${{ env.PUBLISH_DIR }}/wwwroot

      # ── Empaquetar y desplegar vía publish-profile ─────────────
      - name: Zip artifact
        run: cd ${{ env.PUBLISH_DIR }} && zip -r ../deploy.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

      # ── Docker: Build + Push a ACR (activo cuando ACR_LOGIN_SERVER esté configurado) ──
      - name: Set up Docker Buildx
        if: env.ACR_LOGIN_SERVER != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        if: env.ACR_LOGIN_SERVER != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build and push Docker image to ACR
        if: env.ACR_LOGIN_SERVER != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/aulaia-api:latest
            ${{ env.ACR_LOGIN_SERVER }}/aulaia-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/aulaia-api:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/aulaia-api:buildcache,mode=max

      # ── Deploy a Container App ─────────────────────────────────────────────
      - name: Azure CLI login
        if: env.ACR_LOGIN_SERVER != ''
        run: |
          az login \
            --username "${{ secrets.AZURE_USERNAME }}" \
            --password "${{ secrets.AZURE_PASSWORD }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Update Container App with new image
        if: env.ACR_LOGIN_SERVER != ''
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/aulaia-api:${{ github.sha }}
